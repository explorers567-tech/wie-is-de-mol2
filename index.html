<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Mol van het Vikingkamp</title>
<style>
:root{
  --wood-dark:#2b1d12;
  --wood:#4a2f1c;
  --wood-light:#6b4226;
  --parchment:#f3e6c8;
  --parchment-dark:#e3d2a3;

  --ink:#2a1f14;

.reveal-screen img{
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}

.reveal-screen img:hover{
  transform: scale(1.08);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Trebuchet MS', Verdana, sans-serif;

}

.card{
  background:var(--parchment);
  border:3px solid var(--wood);

  padding:18px;
  margin-bottom:16px;
  box-shadow:0 6px 16px var(--shadow);

}

  content:"";

}
h1{
  font-family:'Georgia', serif;
  text-align:center;

}

.subtitle{

}
h2{font-family:Georgia, serif;color:var(--wood-dark);border-bottom:2px solid var(--gold);padding-bottom:6px;margin-top:0;}
h3{color:var(--wood);margin-bottom:6px;}
p{line-height:1.5;}
label{display:block;font-weight:bold;margin:10px 0 4px;color:var(--wood-dark);font-size:14px;}
input[type=text], input[type=number], input[type=password], select, textarea{

textarea{resize:vertical;min-height:50px;}

}

button.secondary{background:#cfc4a4;}
button.danger{background:linear-gradient(180deg,#c97050,var(--red));color:#fff8ec;}
button.full{width:100%;display:block;margin-left:0;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.pill{
  display:inline-block;background:var(--wood);color:var(--parchment);
  padding:3px 10px;border-radius:14px;font-size:12px;margin:2px;
}
.pill-green{background:var(--green);}
.option-btn{
  display:block;width:100%;text-align:left;padding:12px 14px;margin:8px 0;
  background:#fffdf6;border:2px solid var(--wood-light);border-radius:8px;
  cursor:pointer;font-size:15px;color:var(--ink);box-shadow:none;
}
.option-btn:hover{background:#fff3d6;}
.option-btn.selected{background:var(--gold-light);border-color:var(--wood-dark);}
.option-btn.correct{background:#bfe0ab;border-color:var(--green);}
.option-btn.wrong{background:#e8b3a6;border-color:var(--red);}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.topbar button{margin:0;padding:6px 10px;font-size:13px;}
.progress-wrap{background:#d8c9a0;border-radius:8px;overflow:hidden;height:10px;margin:10px 0;border:1px solid var(--wood);}
.progress-bar{background:var(--green);height:100%;transition:width .2s;}
.timer{font-weight:bold;color:var(--red);font-size:13px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--wood-light);}
th{color:var(--wood-dark);}
.rank-1 td{color:var(--gold);font-weight:bold;}
.rank-last td{color:var(--red);}
.small{font-size:12px;color:var(--wood);}
.qlist-item{border:1px solid var(--wood-light);border-radius:6px;padding:8px;margin-bottom:6px;background:#fffdf6;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.tag-mol{background:var(--red);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;}
.center{text-align:center;}
.hidden{display:none;}
.loading{text-align:center;color:var(--parchment-dark);padding:40px;}
.axe-divider{text-align:center;color:var(--gold);margin:10px 0;letter-spacing:8px;}
.winner-box{background:linear-gradient(135deg,#fff8dc,#f3e6c8);border:2px solid var(--gold);border-radius:10px;padding:14px;margin:10px 0;text-align:center;}
.loser-box{background:#fdf0ee;border:2px solid var(--red);border-radius:10px;padding:14px;margin:10px 0;text-align:center;}
.trophy{font-size:32px;}
/* Rood/groen onthulscherm — fullscreen */
.reveal-screen{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:30px;
  animation:fadeInReveal .6s ease;
}
@keyframes fadeInReveal{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}

.reveal-screen.green{
  background: radial-gradient(circle,#3aa63a,#0f3d0f);
}
.reveal-screen.red{
  background: radial-gradient(circle,#b33a2f,#3d0f0a);
}
``

.reveal-icon{font-size:90px;animation:bounceIn .5s .3s both;}
@keyframes bounceIn{0%{transform:scale(0);}70%{transform:scale(1.15);}100%{transform:scale(1);}}
.reveal-msg{font-size:22px;color:rgba(255,255,255,.9);margin-top:8px;}

</style>
</head>
<body>
<div id="app">
  <h1><span class="rune">ᛗ</span> Wie is de Mol van het Vikingkamp <span class="rune">ᛗ</span></h1>
  <div class="subtitle">— Wie verraadt het Viking volk? —</div>
  <div id="content"><div class="loading">Het noodlot wordt geraadpleegd...</div></div>
</div>
<script>
const PIN = "1066";

const VIKINGS = {
  green: {
    male: "https://i.imgur.com/8Km9tLL.png",
    female: "https://i.imgur.com/2RXYdN8.png"
  },
  red: {
    male: "https://i.imgur.com/3sKXH3T.png",
    female: "https://i.imgur.com/jK9nE7G.png"
  }
};
const POINTS_PER_Q = 10;
const DAYS = [1,2,3,4,5,6];
let me = null;
let isAdmin = false;
let quizState = null;

// ---------- FIREBASE CONFIG (vast ingesteld) ----------
const FIREBASE_URL_DEFAULT = "https://wie-is-de-mol-2026-default-rtdb.europe-west1.firebasedatabase.app";
let FIREBASE_URL = localStorage.getItem("mol_firebase_url") || FIREBASE_URL_DEFAULT;

async function sGet(path){
  if(!FIREBASE_URL) return null;
  try{
    const r = await fetch(FIREBASE_URL.replace(/\/$/,"") + "/" + path + ".json");
    if(!r.ok) return null;
    const data = await r.json();
    return data === null ? null : data;
  } catch(e){ console.error("firebase get failed", path, e); return null; }
}
async function sSet(path, val){
  if(!FIREBASE_URL){ console.error("Geen database-URL ingesteld."); return false; }
  try{
    const r = await fetch(FIREBASE_URL.replace(/\/$/,"") + "/" + path + ".json", {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(val)
    });
    if(!r.ok){
      const t = await r.text().catch(()=> "");
      console.error("firebase set niet ok", path, r.status, t);
    }
    return r.ok;
  } catch(e){ console.error("firebase set failed", path, e); return false; }
}

function uid(){ return "p" + Math.random().toString(36).slice(2,9); }
function esc(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

async function getPlayers(){
  const d = await sGet("players");
  if(!d) return [];
  return Array.isArray(d) ? d.filter(Boolean) : Object.values(d);
}
async function getBank(){
  const d = await sGet("bank");
  if(!d) return [];
  return Array.isArray(d) ? d.filter(Boolean) : Object.values(d);
}
// FIX: getDay gebruikte eerder een getal als sleutel — Firebase slaat dit op als array-index.
// Door de sleutel als string "day_N" op te slaan, werkt dag 1 correct.
async function getDay(n){
  const d = await sGet("days/day_"+n);
  return d || {questionIds:[], dayQuestions:[], molId:null, open:false, votingOpen:false, closed:false};
}
async function setDay(n, val){ return await sSet("days/day_"+n, val); }
async function getAnswer(day, playerId){ return await sGet("answers/day_"+day+"/"+playerId); }
async function setAnswer(day, playerId, val){ return await sSet("answers/day_"+day+"/"+playerId, val); }
async function getProfile(playerId){ return (await sGet("profiles/"+playerId)) || {}; }
async function saveProfile(playerId, data){ return await sSet("profiles/"+playerId, data); }

// ---------- MOLLICITATIE VRAGEN ----------
const FIXED_QUESTIONS = [
  {key:"eten",       label:"Favoriete eten",                              template:a=>`Wie houdt het meest van ${a}?`},
  {key:"muziek",     label:"Favoriete muziek / artiest",                  template:a=>`Wie luistert het meest naar ${a}?`},
  {key:"film",       label:"Favoriete film of serie",                     template:a=>`Van wie is dit de favoriete film of serie: ${a}?`},
  {key:"huisdier",   label:"Huisdieren",                                  template:a=>`Wie heeft dit huisdier (of deze huisdieren): ${a}?`},
  {key:"hobby",      label:"Hobby / vrije tijd",                          template:a=>`Wie doet dit het liefst in zijn of haar vrije tijd: ${a}?`},
  {key:"vak",        label:"Lievelingsvak op school",                     template:a=>`Wiens lievelingsvak op school is ${a}?`},
  {key:"vakantie",   label:"Droomvakantiebestemming",                     template:a=>`Wie wil het allerliefst naartoe: ${a}?`},
  {key:"bijnaam",    label:"Bijnaam",                                     template:a=>`Wiens bijnaam is dit: ${a}?`},
  {key:"minstvak",   label:"Minst favoriete vak",                        template:a=>`Wie heeft hier een hekel aan op school: ${a}?`},
  {key:"genant",     label:"Gênante situatie",                            template:a=>`Bij wie is dit ooit gebeurd: ${a}?`},
  {key:"jeugd",      label:"Jeugdherinnering",                            template:a=>`Van wie is dit een jeugdherinnering: ${a}?`},
  {key:"superkracht",label:"Gekozen superkracht",                         template:a=>`Wie zou deze superkracht kiezen: ${a}?`},
  {key:"goedin",     label:"Iets waar je stiekem goed in bent",           template:a=>`Wie is hier stiekem heel goed in: ${a}?`},
  {key:"droom",      label:"Grootste droom of ambitie",                   template:a=>`Wiens grote droom is dit: ${a}?`},
  {key:"gewoonte",   label:"Typische eigenaardigheid",                    template:a=>`Bij wie hoort deze gewoonte: ${a}?`},
  {key:"bang",       label:"Vroeger bang voor, nu niet meer",             template:a=>`Wie was hier vroeger bang voor: ${a}?`},
  {key:"trots",      label:"Waar het meest trots op",                     template:a=>`Wie is hier het meest trots op: ${a}?`},
  {key:"onzichtbaar",label:"Wat zou je doen als je 1 dag onzichtbaar was",template:a=>`Wie zou dit doen als hij of zij onzichtbaar was: ${a}?`}
];

function render(html){ document.getElementById("content").innerHTML = html; }

function topbar(title, backFn){
  return `<div class="topbar">
    <button class="secondary" onclick="(${backFn})()">&larr; Terug</button>
    <strong style="color:var(--wood-dark)">${esc(title)}</strong>
    <span></span>
  </div>`;
}

// ---------- START ----------
async function showStart(){
  isAdmin = false; me = null;
  render(`
    <div class="card center">
      <h2>Welkom, Viking</h2>
      <p>Ben je een dappere strijder die de test gaat doen, of de wijze stamhoofdster/stamhoofd die alles regelt?</p>
      <button class="full" onclick="showPlayerLogin()">Ik ben speler</button>
      <button class="full secondary" onclick="showAdminLogin()">Ik ben een Super toffe Begeleiding</button>
    </div>
    <p class="center small" style="color:var(--parchment-dark)"><a href="#" onclick="showSetup();return false;" style="color:var(--gold-light)">database-koppeling wijzigen</a></p>
  `);
}

// ---------- PLAYER LOGIN ----------
async function showPlayerLogin(){
  render(`
    <div class="card">
      <h2>Wie ben jij?</h2>
      <p>Typ jouw naam precies zoals die is opgegeven door de organisatie.</p>
      <label>Jouw naam</label>
      <input type="text" id="playerNameInput" placeholder="Voer je naam in..." autocomplete="off">
      <div id="loginError" style="color:var(--red);font-size:13px;margin-top:6px;display:none;"></div>
      <button class="full" style="margin-top:14px" onclick="confirmPlayer()">Verder</button>
      <button class="secondary full" onclick="showStart()">&larr; Terug</button>
    </div>
  `);
  // Enter-toets werkt ook
  setTimeout(()=>{
    const inp = document.getElementById("playerNameInput");
    if(inp) inp.addEventListener("keydown", e=>{ if(e.key==="Enter") confirmPlayer(); });
  }, 50);
}

async function confirmPlayer(){
  const input = document.getElementById("playerNameInput").value.trim();
  if(!input){
    document.getElementById("loginError").textContent = "Vul je naam in.";
    document.getElementById("loginError").style.display = "block";
    return;
  }
  render(`<div class="loading">Naam controleren...</div>`);
  const players = await getPlayers();
  // Hoofdletterongevoelige vergelijking zodat "menno" en "Menno" beide werken
  const found = players.find(p => p.name.trim().toLowerCase() === input.toLowerCase());
  if(!found){
    render(`
      <div class="card">
        <h2>Wie ben jij?</h2>
        <p>Typ jouw naam precies zoals die is opgegeven door de organisatie.</p>
        <label>Jouw naam</label>
        <input type="text" id="playerNameInput" value="${esc(input)}" autocomplete="off">
        <div style="color:var(--red);font-size:13px;margin-top:6px;">
          ❌ De naam <strong>${esc(input)}</strong> is niet gevonden. Controleer de spelling en probeer opnieuw.
        </div>
        <button class="full" style="margin-top:14px" onclick="confirmPlayer()">Verder</button>
        <button class="secondary full" onclick="showStart()">&larr; Terug</button>
      </div>
    `);
    setTimeout(()=>{
      const inp = document.getElementById("playerNameInput");
      if(inp){ inp.focus(); inp.addEventListener("keydown", e=>{ if(e.key==="Enter") confirmPlayer(); }); }
    }, 50);
    return;
  }
  me = found;
  const profile = await getProfile(me.id);
  if(!profile || !profile.completed){
    showProfileIntake(profile || {});
  } else {
    showPlayerHome();
  }
}

// ---------- MOLLICITATIE BIJ EERSTE LOGIN ----------
function showProfileIntake(existingProfile){
  let html = `
    <div class="card">
      <h2>Welkom bij Wie is de Mol, ${esc(me.name)}!</h2>
      <p>Voordat je begint, vul je eerst jouw <strong>mollicitatie</strong> in. Jouw antwoorden worden gebruikt om vragen over jou te maken voor de andere spelers. Niemand anders ziet jouw antwoorden — alleen de organisatie. Je mag een vraag leeg laten als je dat liever hebt.</p>
    </div>
    <div class="card">
      <h2>Jouw mollicitatie</h2>
  `;
  FIXED_QUESTIONS.forEach(fq=>{
    html += `<label>${esc(fq.label)}</label><textarea id="intake_${fq.key}" placeholder="Jouw antwoord...">${esc((existingProfile && existingProfile[fq.key])||"")}</textarea>`;
  });
  html += `
      <button class="full" style="margin-top:16px" onclick="submitProfileIntake()">✓ Klaar — ga naar de testen</button>
    </div>
  `;
  render(html);
}

async function submitProfileIntake(){
  const data = {completed: true};
  FIXED_QUESTIONS.forEach(fq=>{
    const el = document.getElementById("intake_"+fq.key);
    if(el){
      const v = el.value.trim();
      if(v) data[fq.key] = v;
    }
  });
  render(`<div class="loading">Antwoorden opslaan...</div>`);
  const ok = await saveProfile(me.id, data);
  if(!ok){ alert("Opslaan is mislukt. Controleer je internetverbinding en probeer opnieuw."); showProfileIntake(data); return; }
  showPlayerHome();
}

// ---------- PLAYER HOME ----------
async function showPlayerHome(){
  render(`<div class="loading">Overzicht laden...</div>`);
  let rows = "";
  for(const d of DAYS){
    const day = await getDay(d);
    const ans = await getAnswer(d, me.id);
    let status, action;
    if(!day.open){
      status = `<span class="small">nog niet geopend</span>`;
      action = `<button disabled class="secondary">Gesloten</button>`;
    } else if(ans && ans.submitted){
      status = `<span class="small">ingeleverd ✓ &mdash; ${ans.score} punten</span>`;
      action = `<button class="secondary" disabled>Gedaan</button>`;
    } else {
      status = `<span class="small">klaar om te spelen!</span>`;
      action = `<button onclick="startQuiz(${d})">Start test</button>`;
    }
    rows += `<div class="qlist-item flex-between"><div><strong>Dag ${d}</strong><br>${status}</div>${action}</div>`;
  }
  render(`
    ${topbar("Speler: "+me.name, "showStart")}
    <div class="card">
      <h2>Dagtesten</h2>
      ${rows}
    </div>
    <div class="card">
      <h2>🏆 Totaal ranglijst</h2>
      <div id="scoreboardHolder">laden...</div>
    </div>
  `);
  renderScoreboard("scoreboardHolder", false);
}

// ---------- QUIZ FLOW ----------
async function startQuiz(dayNum){
  render(`<div class="loading">Test laden...</div>`);
  const day = await getDay(dayNum);
  const bank = await getBank();
  const players = await getPlayers();
  const bankQs = day.questionIds.map(id=>bank.find(b=>b.id===id)).filter(Boolean);
  const dayQs = (day.dayQuestions||[]);
  const allQs = [...bankQs, ...dayQs].map(q=>({...q}));
  if(allQs.length===0){
    render(`<div class="card center"><p>Deze dag heeft nog geen vragen. Vraag de Super toffe Begeleiding om deze in te vullen.</p><button onclick="showPlayerHome()">Terug</button></div>`);
    return;
  }
  quizState = {
    dayNum, questions: allQs, idx: 0,
    answers: new Array(allQs.length).fill(null),
    qStart: Date.now(), totalStart: Date.now(),
    times: new Array(allQs.length).fill(0),
    molGuess: null, players
  };
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const qs = quizState;
  if(qs.idx >= qs.questions.length){
    renderMolGuess();
    return;
  }
  const q = qs.questions[qs.idx];
  const pct = Math.round((qs.idx/(qs.questions.length+1))*100);
  const opts = q.options.map((o,i)=>`<button class="option-btn" onclick="answerQuestion(${i})">${esc(o)}</button>`).join("");
  render(`
    <div class="card">
      <div class="small">Vraag ${qs.idx+1} van ${qs.questions.length}</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <h3>${esc(q.text)}</h3>
      ${opts}
    </div>
  `);
  qs.qStart = Date.now();
}

function answerQuestion(i){
  const qs = quizState;
  qs.answers[qs.idx] = i;
  qs.times[qs.idx] = Date.now() - qs.qStart;
  qs.idx++;
  renderQuizQuestion();
}

async function renderMolGuess(){
  const qs = quizState;
  const others = qs.players.filter(p=>p.id!==me.id);
  const opts = others.map(p=>`<button class="option-btn" onclick="answerMolGuess('${p.id}')">${esc(p.name)}</button>`).join("");
  render(`
    <div class="card">
      <h3>Laatste vraag — helemaal geheim...</h3>
      <p>Wie denk jij dat <strong>vandaag</strong> de Mol is?</p>
      ${opts}
    </div>
  `);
}

async function answerMolGuess(playerId){
  quizState.molGuess = playerId;
  await finishQuiz();
}

async function finishQuiz(){
  const qs = quizState;
  render(`<div class="loading">Resultaten opslaan...</div>`);
  const day = await getDay(qs.dayNum);
  const bank = await getBank();
  const bankQs = day.questionIds.map(id=>bank.find(b=>b.id===id)).filter(Boolean);
  const dayQs = (day.dayQuestions||[]);
  const allQs = [...bankQs, ...dayQs];
  let correct = 0;
  qs.answers.forEach((a,i)=>{ if(allQs[i] && a===allQs[i].correctIndex) correct++; });
  const score = correct * POINTS_PER_Q;
  const totalTimeMs = Date.now() - qs.totalStart;
  const record = {
    answers: qs.answers, times: qs.times, totalTimeMs,
    correct, score, molGuess: qs.molGuess, submitted: true, submittedAt: Date.now()
  };
  await setAnswer(qs.dayNum, me.id, record);
  render(`
    <div class="card center">
      <h2>Test ingeleverd!</h2>
      <p>Je had <strong>${correct}</strong> van de ${allQs.length} vragen goed.</p>
      <p style="font-size:22px;color:var(--gold)"><strong>${score} punten</strong></p>
      <p class="small">Tijd: ${(totalTimeMs/1000).toFixed(1)} sec (telt mee bij gelijke stand)</p>
      <button class="full" onclick="showPlayerHome()">Terug naar overzicht</button>
    </div>
  `);
}

// ---------- SCOREBOARD ----------
async function computeScoreboard(){
  const players = await getPlayers();
  const totals = {};
  players.forEach(p=>totals[p.id]={id:p.id, name:p.name, points:0, time:0, molDays:[], dayScores:{}});

  for(const d of DAYS){
    const day = await getDay(d);
    const maxForDay = (day.questionIds.length + ((day.dayQuestions||[]).length)) * POINTS_PER_Q;
    const dayScores = {};
    for(const p of players){
      const ans = await getAnswer(d, p.id);
      dayScores[p.id] = (ans && ans.submitted) ? {score: ans.score, time: ans.totalTimeMs||0} : {score:0, time:0};
    }
    if(day.molId && day.closed && dayScores[day.molId]){
      let wrongGuessers=0, totalGuessers=0;
      for(const p of players){
        if(p.id===day.molId) continue;
        const ans = await getAnswer(d, p.id);
        if(ans && ans.submitted && ans.molGuess){
          totalGuessers++;
          if(ans.molGuess!==day.molId) wrongGuessers++;
        }
      }
      const bonus = wrongGuessers * POINTS_PER_Q;
      const uncapped = dayScores[day.molId].score + bonus;
      const capped = maxForDay>0 ? Math.min(uncapped, maxForDay) : uncapped;
      totals[day.molId].molDays.push({day:d, bonus, wrongGuessers, totalGuessers, capped: uncapped>capped});
      dayScores[day.molId].score = capped;
    }
    for(const p of players){
      totals[p.id].points += dayScores[p.id].score;
      totals[p.id].time += dayScores[p.id].time;
      totals[p.id].dayScores[d] = dayScores[p.id].score;
    }
  }
  return Object.values(totals).sort((a,b)=> b.points-a.points || a.time-b.time);
}

async function computeDayResults(d){
  // Geeft {winnerId, loserId} exclusief Mol
  const day = await getDay(d);
  if(!day.closed || !day.molId) return null;
  const players = await getPlayers();
  const eligible = players.filter(p=>p.id!==day.molId);
  const scores = [];
  for(const p of eligible){
    const ans = await getAnswer(d, p.id);
    if(ans && ans.submitted){
      scores.push({id:p.id, name:p.name, score:ans.score, time:ans.totalTimeMs||0});
    }
  }
  if(scores.length===0) return null;
  scores.sort((a,b)=>b.score-a.score||a.time-b.time);
  return {winner: scores[0], loser: scores[scores.length-1], all: scores};
}

async function renderScoreboard(targetId, showDayResults){
  const el = document.getElementById(targetId);
  if(!el) return;
  const ranking = await computeScoreboard();
  const rows = ranking.map((r,i)=>`
    <tr class="${i===0?'rank-1':i===ranking.length-1?'rank-last':''}">
      <td>${i===0?'🥇':i===ranking.length-1?'💀':i+1}</td>
      <td>${esc(r.name)}</td>
      <td>${r.points}</td>
      <td class="small">${(r.time/1000).toFixed(1)}s</td>
    </tr>`).join("");
  let html = `
    <table>
      <tr><th>#</th><th>Speler</th><th>Punten</th><th>Tijd</th></tr>
      ${rows}
    </table>
  `;
  el.innerHTML = html;
}

async function checkPlayerResult(){
  const input = document.getElementById("revealNameInput").value.trim().toLowerCase();
  if(!input){
    alert("Voer een naam in.");
    return;
  }

  const players = await getPlayers();
  const player = players.find(p => p.name.toLowerCase() === input);

  if(!player){
    alert("Speler niet gevonden.");
    return;
  }

  let d = null;
  for(let i = DAYS.length - 1; i >= 0; i--){
    const day = await getDay(DAYS[i]);
    if(day.closed){
      d = DAYS[i];
      break;
    }

    return;

    showReveal("red", player.name);

  }
}

  const text = document.getElementById("gen_text").value.trim();
  if(!text){ alert("De vraagtekst mag niet leeg zijn."); return; }
  const players = await getPlayers();
  const idsShuffled = [correctId, ...checked].sort(()=>Math.random()-0.5);
  const options = idsShuffled.map(id=>players.find(p=>p.id===id).name);
  const correctIndex = idsShuffled.indexOf(correctId);
  const bank = await getBank();
  bank.push({id: uid()+"q", text, options, correctIndex});
  const ok = await sSet("bank", bank);
  if(!ok){ alert("Opslaan is mislukt."); return; }

    </div>
  `);
  renderScoreboard("scoreboardHolder2", true);
  renderDayResults("dayResultsHolder");
  renderMolInfo("molInfoHolder");
}

async function renderDayResults(targetId){
  let html = "";
  for(const d of DAYS){
    const day = await getDay(d);
    if(!day.closed || !day.molId){
      html += `<div class="qlist-item"><strong>Dag ${d}</strong> <span class="small">— nog niet afgerond</span></div>`;
      continue;
    }
    const result = await computeDayResults(d);
    if(!result){
      html += `<div class="qlist-item"><strong>Dag ${d}</strong> <span class="small">— nog geen inzendingen</span></div>`;
      continue;
    }
    html += `
      <div class="qlist-item">
        <strong>Dag ${d}</strong>
        <div class="winner-box" style="margin-top:8px">
          <div class="trophy">🥇</div>
          <strong>Dagwinnaar: ${esc(result.winner.name)}</strong><br>
          <span class="small">${result.winner.score} punten — ${(result.winner.time/1000).toFixed(1)}s</span>
        </div>
        <div class="loser-box">
          <div class="trophy">💀</div>
          <strong>Dag-verliezer: ${esc(result.loser.name)}</strong><br>
          <span class="small">${result.loser.score} punten — ${(result.loser.time/1000).toFixed(1)}s</span>
        </div>
      </div>`;
  }
  const el = document.getElementById(targetId);
  if(el) el.innerHTML = html || "<p class='small'>Nog geen dagen afgerond.</p>";
}

async function renderMolInfo(targetId){
  const ranking = await computeScoreboard();
  let html = "";
  for(const r of ranking){
    if(r.molDays && r.molDays.length){
      for(const md of r.molDays){
        html += `<div class="qlist-item">
          <strong>${esc(r.name)}</strong> was de Mol op dag ${md.day}.<br>
          <span class="small">${md.wrongGuessers} van ${md.totalGuessers} spelers hadden het mis → bonus ${md.bonus} punten${md.capped?" (afgetopt op maximum)":""}.</span>
        </div>`;
      }
    }
  }
  const el = document.getElementById(targetId);
  if(el) el.innerHTML = html || "<p class='small'>Nog geen dagen afgerond.</p>";
}

// ---------- DATABASE SETUP ----------
function showSetup(){
  render(`
    <div class="card">
      <h2>Database-koppeling</h2>
      <p>De Firebase URL is al ingesteld. Je kunt hem hier wijzigen als dat nodig is.</p>
      <label>Firebase Realtime Database URL</label>
      <input type="text" id="fbUrl" value="${esc(FIREBASE_URL)}" placeholder="https://...firebasedatabase.app">
      <button class="full" style="margin-top:14px" onclick="saveSetup()">Opslaan en verder</button>
      <button class="secondary full" onclick="showStart()">Annuleer</button>
    </div>
  `);
}
function saveSetup(){
  const v = document.getElementById("fbUrl").value.trim();
  if(!v.startsWith("https://")){ alert("Dat lijkt geen geldige URL."); return; }
  FIREBASE_URL = v;
  localStorage.setItem("mol_firebase_url", v);
  showStart();
}

// ---------- START APP ----------
showStart();
</script>
